  name: CI

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  env:
    CARGO_TERM_COLOR: always

  jobs:
    test:
      strategy:
        matrix:
          os: [ubuntu-latest, macos-latest]
      runs-on: ${{ matrix.os }}

      steps:
        - uses: actions/checkout@v4

        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable

        - name: Install CMake + HDF5 (Ubuntu)
          if: runner.os == 'Linux'
          run: sudo apt-get update && sudo apt-get install -y cmake && sudo apt-get install libhdf5-dev

        - name: Install CMake + HDF5 (macOS)
          if: runner.os == 'macOS'
          run: brew install cmake hdf5@1.10

        - name: Cache cargo
          uses: actions/cache@v4
          with:
            path: |
              ~/.cargo/registry
              ~/.cargo/git
              target
            key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            restore-keys: ${{ runner.os }}-cargo-

        - name: Build
          run: cargo build --workspace

        - name: Test
          run: cargo test --workspace

    clippy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: clippy
        - name: Install CMake
          run: sudo apt-get update && sudo apt-get install -y cmake && sudo apt-get install libhdf5-dev
        - name: Clippy
          run: cargo clippy --workspace -- -D warnings

    fmt:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: rustfmt
        - name: Format check
          run: cargo fmt --all -- --check
