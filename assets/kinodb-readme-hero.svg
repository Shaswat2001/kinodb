<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">kinodb robot trajectory database logo</title>
  <desc id="desc">A centered kinodb launch visual with a database icon, gradient kinodb wordmark, subtitle, tagline, and dataset source chips.</desc>
  <defs>
    <linearGradient id="dbGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="pathGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="800" height="800" fill="#020617"/>

  <g transform="translate(280 120)">
    <ellipse cx="120" cy="80" rx="70" ry="20" fill="url(#dbGradient)" opacity="0.15"/>
    <ellipse cx="120" cy="80" rx="70" ry="20" fill="none" stroke="url(#dbGradient)" stroke-width="2.5"/>

    <rect x="50" y="80" width="140" height="80" fill="#64748B" opacity="0.05"/>
    <line x1="50" y1="80" x2="50" y2="160" stroke="url(#dbGradient)" stroke-width="2.5"/>
    <line x1="190" y1="80" x2="190" y2="160" stroke="url(#dbGradient)" stroke-width="2.5"/>

    <ellipse cx="120" cy="160" rx="70" ry="20" fill="#64748B" opacity="0.1"/>
    <ellipse cx="120" cy="160" rx="70" ry="20" fill="none" stroke="url(#dbGradient)" stroke-width="2.5"/>

    <path d="M60 100 Q80 85 100 100 T140 100 Q155 100 170 110" fill="none" stroke="url(#pathGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

    <circle cx="60" cy="100" r="4" fill="#3B82F6"/>
    <circle cx="100" cy="100" r="3.5" fill="#8B5CF6"/>
    <circle cx="140" cy="100" r="3.5" fill="#A855F7"/>
    <circle cx="170" cy="110" r="4.5" fill="#EC4899"/>
    <g transform="translate(185 105)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.18"/>
      <circle cx="0" cy="0" r="24" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.08"/>
    </g>

    <rect x="60" y="120" width="35" height="4" rx="2" fill="#3B82F6" opacity="0.3"/>
    <rect x="100" y="125" width="45" height="4" rx="2" fill="#8B5CF6" opacity="0.3"/>
    <rect x="70" y="135" width="50" height="4" rx="2" fill="#A855F7" opacity="0.3"/>
    <rect x="125" y="130" width="40" height="4" rx="2" fill="#EC4899" opacity="0.3"/>
  </g>

  <g text-anchor="middle" class="mono">
    <text x="400" y="430" font-size="96" fill="#E2E8F0"><tspan font-weight="700" fill="url(#textGradient)">kino</tspan><tspan font-weight="300" fill="#E2E8F0">db</tspan></text>

    <text x="400" y="490" font-size="12" font-weight="400" letter-spacing="4" fill="#64748B">ROBOT TRAJECTORY DATABASE</text>
  </g>

  <text x="400" y="532" text-anchor="middle" class="mono" font-size="15" font-weight="400" fill="#94A3B8">
    <tspan x="400">High-performance trajectory data pipeline</tspan>
    <tspan x="400" dy="24">from HDF5 to GPU-saturating training batches.</tspan>
  </text>

  <g transform="translate(400 615)" class="mono" font-size="14">
    <rect x="-223" y="0" width="120" height="36" rx="8" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.2"/>
    <text x="-163" y="23" text-anchor="middle" fill="#60A5FA">robomimic</text>

    <rect x="-91" y="0" width="90" height="36" rx="8" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-opacity="0.2"/>
    <text x="-46" y="23" text-anchor="middle" fill="#A78BFA">LIBERO</text>

    <rect x="11" y="0" width="80" height="36" rx="8" fill="#EC4899" fill-opacity="0.1" stroke="#EC4899" stroke-opacity="0.2"/>
    <text x="51" y="23" text-anchor="middle" fill="#F9A8D4">DROID</text>

    <rect x="103" y="0" width="120" height="36" rx="8" fill="#3B82F6" fill-opacity="0.05" stroke="#475569" stroke-opacity="0.3"/>
    <text x="163" y="23" text-anchor="middle" font-weight="700" fill="#CBD5E1">.kdb format</text>
  </g>
</svg>
